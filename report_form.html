<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вечерний отчёт РСУ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 14px; background:#f4f4f4; color:#222; }
    .card { background:#fff; border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    h2 { margin:0 0 8px; font-size: 18px; }
    label { display:block; margin-top: 10px; margin-bottom: 4px; font-weight: 700; }
    input, select, textarea, button { width:100%; box-sizing:border-box; padding:10px; border:1px solid #ccc; border-radius:10px; font-size:14px; }
    textarea { min-height: 80px; resize: vertical; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .hidden { display:none; }
    .item { border:1px dashed #bbb; border-radius: 10px; padding: 10px; margin-top: 10px; background:#fafafa; }
    .btn-secondary { margin-top:10px; background:#ececec; border:none; cursor:pointer; }
    .btn-danger { margin-top:10px; background:#ffdede; border:none; cursor:pointer; }
    .submit-btn { background:#2f7cff; color:#fff; border:none; font-weight:800; cursor:pointer; padding:12px; border-radius: 12px; }
    .hint { font-size: 12px; color:#666; margin-top:4px; }
  </style>
</head>
<body>
<form id="reportForm">

  <div class="card">
    <h2>Шапка</h2>

    <label>Бригада</label>
    <select id="brigade" required>
      <option value="">Выбери</option>
      <option>Теплотрасса</option>
      <option>Отделочники</option>
      <option>Котельные</option>
      <option>Фасад</option>
    </select>

    <label>Тип объекта</label>
    <select id="objectType" required>
      <option value="">Выбери</option>
      <option value="boiler_house">Котельная</option>
      <option value="heating_main">Теплотрасса</option>
      <option value="bathhouse">Баня</option>
      <option value="road">Дорога / тротуар</option>
      <option value="building">Здание / помещение</option>
      <option value="reconstruction">Реконструкция</option>
      <option value="other">Другое</option>
    </select>

    <label>Объект (название)</label>
    <input id="objectName" placeholder="Например: Котельная №17, Теплотрасса ул. Ленина" required />

    <div class="row">
      <div>
        <label>Дата</label>
        <input type="date" id="reportDate" required />
      </div>
      <div>
        <label>Сколько человек</label>
        <input type="number" id="workersCount" min="1" required />
      </div>
    </div>

    <label>План закрыли?</label>
    <select id="planStatus" required>
      <option value="">Выбери</option>
      <option value="yes">Да</option>
      <option value="partial">Частично</option>
      <option value="no">Нет</option>
    </select>

    <div id="planProblemsBlock" class="hidden">
      <label>Что не успели</label>
      <textarea id="unfinishedWork"></textarea>

      <label>Почему</label>
      <select id="planIssueReason">
        <option value="">Выбери</option>
        <option>Не хватило людей</option>
        <option>Не хватило материала</option>
        <option>Не хватило инструмента</option>
        <option>Погода</option>
        <option>Не было доступа</option>
        <option>Мешали смежники</option>
        <option>Поломка</option>
        <option>Появились доп. работы</option>
        <option>Другое</option>
      </select>
    </div>
  </div>

  <div class="card">
    <h2>Выполненные работы</h2>
    <div class="hint">Добавь минимум 1 работу. Пиши объемы, это поможет аналитике.</div>
    <div id="worksContainer"></div>
    <button type="button" class="btn-secondary" onclick="addWork()">+ Добавить работу</button>
  </div>

  <div class="card">
    <h2>Материалы</h2>
    <div class="hint">Если материала нет в списке, впиши вручную.</div>

    <label>Было на объекте до начала работ?</label>
    <select id="hadOnObject">
      <option value="no">Нет</option>
      <option value="yes">Да</option>
    </select>
    <div id="hadOnObjectBlock" class="hidden">
      <div id="materialsHadContainer"></div>
      <button type="button" class="btn-secondary" onclick="addMaterial('had')">+ Добавить (было)</button>
    </div>

    <label>Приехало сегодня на объект?</label>
    <select id="arrivedToday">
      <option value="no">Нет</option>
      <option value="yes">Да</option>
    </select>
    <div id="arrivedTodayBlock" class="hidden">
      <div class="hint">Если приехало по ТТН, потом добавим кнопку “сфотографировать ТТН”. Сейчас фиксируем фактом.</div>
      <div id="materialsArrivedContainer"></div>
      <button type="button" class="btn-secondary" onclick="addMaterial('arrived')">+ Добавить (приехало)</button>
    </div>
  </div>

  <div class="card">
    <h2>Проблемы / дефекты</h2>
    <label>Были проблемы?</label>
    <select id="siteIssues">
      <option value="no">Нет</option>
      <option value="yes">Да</option>
    </select>

    <div id="siteIssuesBlock" class="hidden">
      <label>Тип проблемы</label>
      <select id="siteIssueType">
        <option value="">Выбери</option>
        <option>Нет материала</option>
        <option>Нет инструмента</option>
        <option>Не хватает людей</option>
        <option>Брак/дефект</option>
        <option>Неготовность фронта</option>
        <option>Нет доступа</option>
        <option>Мешают смежники</option>
        <option>Погода</option>
        <option>Аварийная ситуация</option>
        <option>Другое</option>
      </select>

      <label>Комментарий</label>
      <textarea id="siteIssueComment"></textarea>

      <label>Нужна реакция руководителя?</label>
      <select id="needBossReaction">
        <option value="no">Нет</option>
        <option value="yes">Да</option>
      </select>
    </div>
  </div>

  <div class="card">
    <h2>План на завтра</h2>
    <label>Что делаете завтра</label>
    <textarea id="tomorrowPlan" required></textarea>

    <label>Что нужно (материал/инструмент/люди)</label>
    <textarea id="tomorrowNeeds"></textarea>

    <label>Риски на завтра?</label>
    <select id="tomorrowRisks">
      <option value="no">Нет</option>
      <option value="yes">Да</option>
    </select>

    <div id="tomorrowRisksBlock" class="hidden">
      <label>Какие риски</label>
      <textarea id="tomorrowRisksText"></textarea>
    </div>
  </div>

  <button type="submit" class="submit-btn">Отправить отчёт</button>
</form>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const WORK_TYPES = [
    "Демонтаж", "Монтаж", "Штукатурка", "Шпаклёвка", "Покраска", "Укладка плитки",
    "Сварка", "Земляные работы", "Монтаж труб", "Утепление", "Фасадные работы",
    "Кровельные работы", "Электромонтаж", "Сантехнические работы", "Прочее"
  ];
  const UNITS = ["шт","м","м²","м³","кг","мешок","упак","л","т","компл"];

  function setToday(){
    document.getElementById("reportDate").value = new Date().toISOString().split("T")[0];
  }

  function createSelect(options){
    const s = document.createElement("select");
    const o0 = document.createElement("option");
    o0.value = ""; o0.textContent = "Выбери";
    s.appendChild(o0);
    options.forEach(v=>{
      const o = document.createElement("option");
      o.value = v; o.textContent = v;
      s.appendChild(o);
    });
    return s;
  }

  function addWork(){
    const c = document.getElementById("worksContainer");
    const item = document.createElement("div");
    item.className="item";
    item.innerHTML = `
      <label>Зона/участок</label>
      <input class="w-zone" placeholder="Напр: котельная зал, траншея А-Б, фасад север" />
      <label>Вид работы</label>
      <div class="w-type"></div>
      <div class="row">
        <div>
          <label>Объём</label>
          <input type="number" step="0.01" class="w-vol" />
        </div>
        <div>
          <label>Ед.</label>
          <div class="w-unit"></div>
        </div>
      </div>
      <label>Комментарий</label>
      <textarea class="w-comment" placeholder="Коротко по нюансам"></textarea>
      <button type="button" class="btn-danger">Удалить</button>
    `;
    item.querySelector(".w-type").appendChild(createSelect(WORK_TYPES));
    item.querySelector(".w-type select").className="w-type-sel";
    item.querySelector(".w-unit").appendChild(createSelect(UNITS));
    item.querySelector(".w-unit select").className="w-unit-sel";
    item.querySelector(".btn-danger").addEventListener("click", ()=>item.remove());
    c.appendChild(item);
  }

  function addMaterial(mode){
    const container = (mode==="had") ? document.getElementById("materialsHadContainer")
                                   : document.getElementById("materialsArrivedContainer");
    const item = document.createElement("div");
    item.className="item";
    item.innerHTML = `
      <label>Материал (можно вручную)</label>
      <input class="m-name" placeholder="Напр: Цемент М500, Лотки ЖБИ, Труба 57" />
      <div class="row">
        <div>
          <label>Кол-во</label>
          <input type="number" step="0.01" class="m-qty" />
        </div>
        <div>
          <label>Ед.</label>
          <div class="m-unit"></div>
        </div>
      </div>
      <label>Источник</label>
      <select class="m-source">
        <option value="">Выбери</option>
        <option>Остаток на объекте</option>
        <option>Со склада</option>
        <option>От поставщика</option>
        <option>С другого объекта</option>
        <option>От другого подразделения</option>
      </select>
      <label>Комментарий</label>
      <input class="m-comment" placeholder="Напр: по ТТН, без документа, привёз водитель" />
      <button type="button" class="btn-danger">Удалить</button>
    `;
    item.querySelector(".m-unit").appendChild(createSelect(UNITS));
    item.querySelector(".m-unit select").className="m-unit-sel";
    item.querySelector(".btn-danger").addEventListener("click", ()=>item.remove());
    container.appendChild(item);
  }

  function getWorks(){
    return [...document.querySelectorAll("#worksContainer .item")].map(it=>({
      zone: it.querySelector(".w-zone").value.trim(),
      work_type: it.querySelector(".w-type-sel").value,
      volume: it.querySelector(".w-vol").value,
      unit: it.querySelector(".w-unit-sel").value,
      comment: it.querySelector(".w-comment").value.trim()
    })).filter(w => w.zone || w.work_type || w.volume || w.comment);
  }

  function getMaterials(containerId, material_mode){
    return [...document.querySelectorAll(`#${containerId} .item`)].map(it=>({
      material_mode,
      raw_name: it.querySelector(".m-name").value.trim(),
      qty: it.querySelector(".m-qty").value,
      unit: it.querySelector(".m-unit-sel").value,
      source_type: it.querySelector(".m-source").value,
      comment: it.querySelector(".m-comment").value.trim()
    })).filter(m => m.raw_name || m.qty);
  }

  document.getElementById("planStatus").addEventListener("change", function(){
    document.getElementById("planProblemsBlock").classList.toggle("hidden", this.value === "yes" || this.value === "");
  });
  document.getElementById("siteIssues").addEventListener("change", function(){
    document.getElementById("siteIssuesBlock").classList.toggle("hidden", this.value !== "yes");
  });
  document.getElementById("tomorrowRisks").addEventListener("change", function(){
    document.getElementById("tomorrowRisksBlock").classList.toggle("hidden", this.value !== "yes");
  });
  document.getElementById("hadOnObject").addEventListener("change", function(){
    document.getElementById("hadOnObjectBlock").classList.toggle("hidden", this.value !== "yes");
  });
  document.getElementById("arrivedToday").addEventListener("change", function(){
    document.getElementById("arrivedTodayBlock").classList.toggle("hidden", this.value !== "yes");
  });

  document.getElementById("reportForm").addEventListener("submit", function(e){
    e.preventDefault();

    const works = getWorks();
    if (works.length === 0){
      tg.showAlert("Добавь хотя бы одну выполненную работу.");
      return;
    }

    const materials = [
      ...getMaterials("materialsHadContainer", "had_on_object"),
      ...getMaterials("materialsArrivedContainer", "arrived_today")
    ];

    const payload = {
      report_type: "evening_report_v1",
      form_version: 1,
      report_date: document.getElementById("reportDate").value,
      brigade: document.getElementById("brigade").value,
      object_type: document.getElementById("objectType").value,
      object_name: document.getElementById("objectName").value.trim(),
      workers_count: Number(document.getElementById("workersCount").value || 0),
      plan_status: document.getElementById("planStatus").value,
      unfinished_work: document.getElementById("unfinishedWork").value.trim(),
      plan_issue_reason: document.getElementById("planIssueReason").value,
      works,
      materials,
      site_issues: document.getElementById("siteIssues").value,
      site_issue_type: document.getElementById("siteIssueType").value,
      site_issue_comment: document.getElementById("siteIssueComment").value.trim(),
      need_boss_reaction: document.getElementById("needBossReaction").value,
      tomorrow_plan: document.getElementById("tomorrowPlan").value.trim(),
      tomorrow_needs: document.getElementById("tomorrowNeeds").value.trim(),
      tomorrow_risks: document.getElementById("tomorrowRisks").value,
      tomorrow_risks_text: document.getElementById("tomorrowRisksText").value.trim(),
      tg_user: tg.initDataUnsafe?.user || null
    };

    if (!payload.brigade || !payload.object_type || !payload.object_name || !payload.report_date || !payload.workers_count){
      tg.showAlert("Заполни бригаду, тип/название объекта, дату и количество людей.");
      return;
    }

    tg.sendData(JSON.stringify(payload));
    tg.close();
  });

  setToday();
  addWork();
</script>
</body>
</html>
