<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вечерний отчёт РСУ v3</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 14px; background:#f4f4f4; color:#222; }
    .card { background:#fff; border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    h2 { margin:0 0 8px; font-size: 18px; }
    label { display:block; margin-top: 10px; margin-bottom: 4px; font-weight: 700; }
    input, select, textarea, button { width:100%; box-sizing:border-box; padding:10px; border:1px solid #ccc; border-radius:10px; font-size:14px; }
    textarea { min-height: 80px; resize: vertical; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .hidden { display:none; }
    .item { border:1px dashed #bbb; border-radius: 10px; padding: 10px; margin-top: 10px; background:#fafafa; }
    .btn-secondary { margin-top:10px; background:#ececec; border:none; cursor:pointer; }
    .btn-danger { margin-top:10px; background:#ffdede; border:none; cursor:pointer; }
    .submit-btn { background:#2f7cff; color:#fff; border:none; font-weight:800; cursor:pointer; padding:12px; border-radius: 12px; }
    .hint { font-size: 12px; color:#666; margin-top:4px; }
  </style>
</head>
<body>
<form id="reportForm">

  <div class="card">
    <h2>1. Направление работ</h2>
    <label>Выбери направление</label>
    <select id="direction" required>
      <option value="">Выбери</option>
      <option value="heating_main">Теплотрасса</option>
      <option value="boiler_ctp">Котельная / ЦТП</option>
      <option value="finish">Отделка / ремонт помещения</option>
      <option value="landscaping">Благоустройство / дорога / тротуар</option>
      <option value="bathhouse">Баня</option>
      <option value="reconstruction">Реконструкция</option>
      <option value="emergency">Аварийные работы</option>
      <option value="other">Прочее</option>
    </select>
  </div>

  <div class="card">
    <h2>2. Общая шапка</h2>

    <label>Бригада</label>
    <select id="brigade" required>
      <option value="">Выбери</option>
      <option>Теплотрасса</option>
      <option>Отделочники</option>
      <option>Котельные</option>
      <option>Фасад</option>
    </select>

    <label>Тип объекта</label>
    <select id="objectType" required>
      <option value="">Выбери</option>
      <option value="boiler_house">Котельная</option>
      <option value="ctp">ЦТП</option>
      <option value="heating_main">Теплотрасса</option>
      <option value="bathhouse">Баня</option>
      <option value="road">Дорога / тротуар</option>
      <option value="building">Здание / помещение</option>
      <option value="reconstruction">Реконструкция</option>
      <option value="other">Другое</option>
    </select>

    <label>Объект</label>
    <input id="objectName" placeholder="Напр: Котельная №17 / Теплотрасса ул. Ленина" required />

    <label>Адрес / участок</label>
    <input id="objectAddress" placeholder="Напр: Заславль, ул. Ленина / ТК-1 — ТК-2" />

    <div class="row">
      <div>
        <label>Дата</label>
        <input type="date" id="reportDate" required />
      </div>
      <div>
        <label>Сколько человек вышло</label>
        <input type="number" id="workersCount" min="1" required />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Смена</label>
        <select id="shiftType">
          <option value="">Выбери</option>
          <option value="day">Дневная</option>
          <option value="evening">Вечерняя</option>
          <option value="emergency">Аварийная</option>
        </select>
      </div>
      <div>
        <label>План выполнен?</label>
        <select id="planStatus" required>
          <option value="">Выбери</option>
          <option value="yes">Да</option>
          <option value="partial">Частично</option>
          <option value="no">Нет</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>3. План-факт</h2>
    <label>Что было запланировано на сегодня</label>
    <textarea id="plannedToday" required></textarea>

    <label>Что реально выполнено сегодня</label>
    <textarea id="completedToday" required></textarea>

    <div id="planProblemsBlock" class="hidden">
      <label>Что не выполнено / не успели</label>
      <textarea id="unfinishedWork"></textarea>

      <label>Причина отклонения</label>
      <select id="planIssueReason">
        <option value="">Выбери</option>
        <option>Не хватило людей</option>
        <option>Не хватило материала</option>
        <option>Не хватило инструмента</option>
        <option>Не было техники</option>
        <option>Погода</option>
        <option>Не было доступа</option>
        <option>Мешали смежники</option>
        <option>Аварийный вызов</option>
        <option>Скрытые дефекты</option>
        <option>Другое</option>
      </select>
    </div>
  </div>

  <div class="card">
    <h2>4. Паспорт направления</h2>

    <div id="heatFields" class="hidden">
      <label>Участок / камера / привязка</label>
      <input id="heat_zone" />
      <div class="row">
        <div>
          <label>Тип сети</label>
          <select id="heat_network_type">
            <option value="">Выбери</option>
            <option>Канальная</option>
            <option>Бесканальная</option>
            <option>Надземная</option>
          </select>
        </div>
        <div>
          <label>Диаметр трубы</label>
          <input id="heat_pipe_diameter" placeholder="Напр: 57 / 89 / 108" />
        </div>
      </div>
      <div class="row">
        <div>
          <label>Длина участка за день, м</label>
          <input type="number" step="0.01" id="heat_length_m" />
        </div>
        <div>
          <label>Количество стыков</label>
          <input type="number" id="heat_joints_count" />
        </div>
      </div>
      <label>Были ли лотки / плиты / камеры</label>
      <input id="heat_structures" placeholder="Напр: 4 лотка, 2 плиты, ТК-3" />
      <label>Была ли вода / пересечения / особые условия</label>
      <input id="heat_conditions" />
    </div>

    <div id="boilerFields" class="hidden">
      <label>Зона</label>
      <input id="boiler_zone" placeholder="Напр: котловой зал, насосная, узел учета" />
      <label>Оборудование / система</label>
      <input id="boiler_equipment" placeholder="Напр: котел, насос, трубопровод, КИПиА" />
      <label>Критично ли для запуска / работы</label>
      <select id="boiler_critical">
        <option value="">Выбери</option>
        <option>Да</option>
        <option>Нет</option>
      </select>
    </div>

    <div id="finishFields" class="hidden">
      <label>Помещение / зона</label>
      <input id="finish_zone" />
      <label>Стадия</label>
      <select id="finish_stage">
        <option value="">Выбери</option>
        <option>Подготовка</option>
        <option>Черновые</option>
        <option>Чистовые</option>
        <option>Завершение</option>
      </select>
    </div>

    <div id="landFields" class="hidden">
      <label>Участок</label>
      <input id="land_zone" />
      <label>Нужен ли вывоз грунта / мусора</label>
      <select id="land_export">
        <option value="">Выбери</option>
        <option>Да</option>
        <option>Нет</option>
      </select>
    </div>

    <div id="bathFields" class="hidden">
      <label>Зона</label>
      <input id="bath_zone" />
      <label>Фокус работ</label>
      <input id="bath_focus" placeholder="Напр: плитка, гидроизоляция, сантехника" />
    </div>

    <div id="reconFields" class="hidden">
      <label>Этап реконструкции</label>
      <input id="recon_stage" placeholder="Напр: демонтаж, монтаж, врезка, наладка" />
      <label>Ключевой узел / зона</label>
      <input id="recon_zone" />
    </div>

    <div id="emergencyFields" class="hidden">
      <label>Тип аварии</label>
      <input id="emergency_type" />
      <div class="row">
        <div>
          <label>Время выезда</label>
          <input id="emergency_departure_time" placeholder="Напр: 14:20" />
        </div>
        <div>
          <label>Время локализации</label>
          <input id="emergency_localized_time" placeholder="Напр: 15:05" />
        </div>
      </div>
      <label>Что повреждено</label>
      <input id="emergency_damage" />
    </div>
  </div>

  <div class="card">
    <h2>5. Выполненные работы</h2>
    <div class="hint">Минимум одна строка.</div>
    <div id="worksContainer"></div>
    <button type="button" class="btn-secondary" onclick="addWork()">+ Добавить работу</button>
  </div>

  <div class="card">
    <h2>6. Люди и привлечённые силы</h2>
    <label>Привлекались дополнительные люди / силы?</label>
    <select id="extraPeopleFlag">
      <option value="no">Нет</option>
      <option value="yes">Да</option>
    </select>
    <div id="peopleBlock" class="hidden">
      <div id="peopleContainer"></div>
      <button type="button" class="btn-secondary" onclick="addPeopleResource()">+ Добавить ресурс</button>
    </div>
  </div>

  <div class="card">
    <h2>7. Спецтехника и механизация</h2>
    <label>Привлекалась спецтехника?</label>
    <select id="equipmentFlag">
      <option value="no">Нет</option>
      <option value="yes">Да</option>
    </select>
    <div id="equipmentBlock" class="hidden">
      <div id="equipmentContainer"></div>
      <button type="button" class="btn-secondary" onclick="addEquipment()">+ Добавить технику</button>
    </div>
  </div>

  <div class="card">
    <h2>8. Материалы</h2>

    <label>Было на объекте до начала работ?</label>
    <select id="hadOnObject">
      <option value="no">Нет</option>
      <option value="yes">Да</option>
    </select>
    <div id="hadOnObjectBlock" class="hidden">
      <div id="materialsHadContainer"></div>
      <button type="button" class="btn-secondary" onclick="addMaterial('had_on_object')">+ Добавить</button>
    </div>

    <label>Приехало сегодня?</label>
    <select id="arrivedToday">
      <option value="no">Нет</option>
      <option value="yes">Да</option>
    </select>
    <div id="arrivedTodayBlock" class="hidden">
      <div id="materialsArrivedContainer"></div>
      <button type="button" class="btn-secondary" onclick="addMaterial('arrived_today')">+ Добавить</button>
    </div>

    <label>Использовали сегодня?</label>
    <select id="usedToday">
      <option value="no">Нет</option>
      <option value="yes">Да</option>
    </select>
    <div id="usedTodayBlock" class="hidden">
      <div id="materialsUsedContainer"></div>
      <button type="button" class="btn-secondary" onclick="addMaterial('used_today')">+ Добавить</button>
