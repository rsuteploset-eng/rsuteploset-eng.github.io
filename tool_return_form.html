<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Возврат инструмента</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            padding: 16px;
            color: #1e2a1c;
        }
        .header {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header img {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            background: #fff;
            border: 1px solid #d7dfd4;
            padding: 4px;
        }
        .header h2 {
            font-size: 18px;
            color: #213d1d;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #657064;
            font-size: 16px;
        }
        .tool-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #d7dfd4;
        }
        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .tool-name {
            font-weight: 700;
            font-size: 16px;
        }
        .tool-code {
            color: #657064;
            font-size: 14px;
            background: #edf4eb;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            color: #355d2f;
        }
        select, input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d7dfd4;
            border-radius: 8px;
            font-size: 16px;
            background: #fafafa;
        }
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #355d2f;
            background: white;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #355d2f;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
        }
        .submit-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #657064;
            background: white;
            border-radius: 12px;
        }
    </style>
</head>

        </div>
    </div>

    <div id="loading" class="loading">
        <p>Загрузка списка инструментов...</p>
    </div>

    <div id="toolsContainer" style="display: none;"></div>
    <button id="submitBtn" class="submit-btn" style="display: none;">Оформить возврат</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let myTools = [];
        let selectedTools = {};

        // Запрашиваем список инструментов при загрузке
        tg.sendData(JSON.stringify({
            type: "get_my_tools"
        }));

        // Слушаем ответ от бота
        tg.onEvent('message', (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === "my_tools_list") {
                    myTools = data.tools;
                    renderTools();
                }
            } catch (e) {
                console.error('Ошибка парсинга ответа:', e);
            }
        });

        function renderTools() {
            document.getElementById('loading').style.display = 'none';
            const container = document.getElementById('toolsContainer');
            
            if (myTools.length === 0) {
                container.innerHTML = '<div class="empty-state">У тебя нет выданных инструментов</div>';
                container.style.display = 'block';
                return;
            }

            container.style.display = 'block';
            container.innerHTML = '';

            myTools.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';
                card.innerHTML = `
                    <div class="tool-header">
                        <span class="tool-name">${tool.name}</span>
                        <span class="tool-code">${tool.code}</span>
                    </div>
                    <div class="form-group">
                        <label>Состояние</label>
                        <select class="condition" data-id="${tool.id}">
                            <option value="исправен">Исправен</option>
                            <option value="требует ремонта">Требует ремонта</option>
                            <option value="сломан">Сломан</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Комментарий</label>
                        <input type="text" class="comment" data-id="${tool.id}" placeholder="Например: скол на корпусе">
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('submitBtn').style.display = 'block';
        }

        document.getElementById('submitBtn').addEventListener('click', () => {
            const returns = myTools.map(tool => {
                const condition = document.querySelector(`.condition[data-id="${tool.id}"]`).value;
                const comment = document.querySelector(`.comment[data-id="${tool.id}"]`).value;
                return {
                    id: tool.id,
                    code: tool.code,
                    name: tool.name,
                    condition: condition,
                    comment: comment
                };
            });

            const payload = {
                type: "asset_return_v1",
                items: returns,
                timestamp: new Date().toISOString()
            };

            tg.sendData(JSON.stringify(payload));
            tg.close();
        });
    </script>
</body>
</html>
