<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Регистрация в системе РСУ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --brand: #355d2f;
            --brand-dark: #213d1d;
            --border: #d7dfd4;
            --text: #1e2a1c;
            --bg: #f4f6f3;
            --white: #ffffff;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
            line-height: 1.5;
        }
        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        .header { text-align: center; margin-bottom: 24px; }
        .header h2 { margin: 0; color: var(--brand-dark); font-size: 22px; }
        .header p { margin: 8px 0 0; font-size: 14px; color: #657064; }
        
        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--brand-dark);
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
            background: #fafafa;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--brand);
            background: var(--white);
        }
        .info-box {
            font-size: 13px;
            background: #edf4eb;
            padding: 12px;
            border-radius: 8px;
            color: var(--brand-dark);
            border-left: 4px solid var(--brand);
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Регистрация сотрудника</h2>
        <p>Минрайтеплосеть • РСУ</p>
    </div>

    <div class="card">
        <label for="fio">Фамилия Имя Отчество</label>
        <input type="text" id="fio" placeholder="Иванов Иван Иванович" required>

        <label for="role">Ваша должность / роль</label>
        <select id="role">
            <option value="Бригадир">Бригадир</option>
            <option value="Мастер">Мастер</option>
            <option value="Начальник участка">Начальник участка</option>
            <option value="Снабженец">Снабженец</option>
            <option value="Механик">Механик</option>
        </select>

        <label for="brigade">Название бригады или Объекта</label>
        <input type="text" id="brigade" placeholder="Бригада №1 / Котельная №17" required>
        
        <div class="info-box">
            После отправки анкеты ваш доступ должен подтвердить Мастер. Вы получите уведомление в боте.
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Настройка главной кнопки Telegram
        tg.MainButton.setText("ОТПРАВИТЬ ЗАЯВКУ");
        tg.MainButton.setParams({
            color: "#355d2f",
            text_color: "#ffffff"
        });
        tg.MainButton.show();

        tg.MainButton.onClick(function() {
            const fio = document.getElementById('fio').value.trim();
            const role = document.getElementById('role').value;
            const brigade = document.getElementById('brigade').value.trim();

            if (fio.length < 5) {
                return tg.showAlert("Введите полное ФИО");
            }
            if (brigade.length < 2) {
                return tg.showAlert("Укажите название бригады или объекта");
            }

            const payload = {
                type: "user_registration_v1",
                fio: fio,
                role: role,
                brigade: brigade,
                timestamp: new Date().toISOString()
            };

            // Отправляем данные боту
            tg.sendData(JSON.stringify(payload));
            tg.close();
        });
    </script>
</body>
</html>
