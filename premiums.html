<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RSU ERP v3 · Премии</title>
  <link rel="stylesheet" href="./base.css">
  <style>
    .premium-page-card {
      overflow: hidden;
    }

    .premium-section-stack {
      display: grid;
      gap: 16px;
    }

    .premium-muted-list {
      display: grid;
      gap: 6px;
      color: var(--rsu-muted);
      font-size: 13px;
    }

    .premium-summary-note {
      color: var(--rsu-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .premium-debug {
      display: none;
      background: #17211d;
      color: #d9efe3;
      border-radius: 14px;
      padding: 14px;
      overflow: auto;
    }

    @media (max-width: 600px) {
      .premium-page-card {
        padding-left: 14px;
        padding-right: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./branding.js"></script>
  <script src="./base_ui.js"></script>
  <script src="./premium_catalogs.js"></script>
  <script src="./premiums.js"></script>
</body>
</html>
