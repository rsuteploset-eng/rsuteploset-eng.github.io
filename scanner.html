<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер инструмента</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            max-width: 400px;
            text-align: center;
        }
        button {
            background-color: #0088cc;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-bottom: 16px;
        }
        button:hover {
            background-color: #0077b5;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            background-color: #e9f7ef;
            border-radius: 8px;
            color: #0a3622;
            word-break: break-all;
        }
        .error {
            background-color: #f8d7da;
            color: #842029;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📷 Сканировать инструмент</h2>
        <button id="scanBtn">Начать сканирование</button>
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const scanBtn = document.getElementById('scanBtn');
        const resultDiv = document.getElementById('result');

        scanBtn.addEventListener('click', () => {
            // Показываем нативный сканер QR
            tg.showScanQrPopup({
                text: 'Наведите камеру на QR-код инструмента'
            }, (result) => {
                // Этот коллбэк вызывается при успешном сканировании
                console.log('QR result:', result);
                resultDiv.style.display = 'block';
                resultDiv.textContent = 'Отсканировано: ' + result;

                // Отправляем результат боту
                tg.sendData(JSON.stringify({
                    scanned: result
                }));

                // Закрываем Web App через секунду
                setTimeout(() => tg.close(), 1000);
                return true; // Закрываем попап после сканирования
            });
        });
    </script>
</body>
</html>
